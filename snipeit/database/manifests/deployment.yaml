apiVersion: apps/v1
kind: Deployment
metadata:
  name: snipeit-mysql
  namespace: snipeit-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snipeit-mysql
  template:
    metadata:
      labels:
        app: snipeit-mysql
    spec:
      containers:
        - name: snipeit-mysql
          image: mysql:8.0
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "America/New_York"
            - name: MYSQL_DATABASE
              value: "snipeit"
            - name: MYSQL_USER
              value: "snipeit_user"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snipeit-db-secret
                  key: password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snipeit-db-secret
                  key: root-password
          ports:
            - containerPort: 3306
              protocol: TCP
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: snipeit-mysql-pvc
