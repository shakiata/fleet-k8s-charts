apiVersion: apps/v1
kind: Deployment
metadata:
  name: snipeit-postgres
  namespace: snipeit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snipeit-postgres
  template:
    metadata:
      labels:
        app: snipeit-postgres
    spec:
      containers:
        - name: snipeit-postgres
          image: postgres:15-alpine
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "America/New_York"
            - name: POSTGRES_DB
              value: "snipeit"
            - name: POSTGRES_USER
              value: "snipeit_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snipeit-db-secret
                  key: password
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256"
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - snipeit_user
                - -d
                - snipeit
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - snipeit_user
                - -d
                - snipeit
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: snipeit-postgres-pvc
